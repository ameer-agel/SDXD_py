<!DOCTYPE html>
<html lang="en" id="mainHtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDXD - My Scans</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --sidebar-blue: #345e85; 
            --accent-emerald: #10b981;
            --bg-body: #f1f5f9;
            --bg-card: #ffffff;
            --text-main: #000000; 
            --text-muted: #334155; 
            --header-bg: #ffffff;
        }

        .dark-mode {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --text-main: #ffffff; 
            --text-muted: #cbd5e1; 
            --header-bg: #1e293b;
            --sidebar-blue: #1a365d;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-body); 
            color: var(--text-main);
            direction: ltr !important; 
            display: flex;
            height: 100vh;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        /* Sidebar */
        #sidebar { 
            min-width: 260px; 
            background: var(--sidebar-blue); 
            color: #fff; 
            height: 100vh; 
            flex-shrink: 0;
            transition: background 0.3s ease;
        }

        .sidebar-header { padding: 30px 10px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        
        #sidebar ul li a { 
            padding: 14px 25px; 
            display: flex; 
            align-items: center; 
            color: #cbdcf0; 
            text-decoration: none; 
            font-size: 14px; 
            transition: 0.3s; 
            border-left: 4px solid transparent; 
        }

        #sidebar ul li a:hover { background: rgba(255,255,255,0.05); color: #fff; }
        #sidebar ul li.active a { background: rgba(255,255,255,0.1); color: #fff; border-left: 4px solid var(--accent-emerald); }
        #sidebar ul li a i { margin-right: 12px; width: 20px; text-align: center; }

        /* Header */
        header { 
            background: var(--header-bg); 
            border-bottom: 1px solid #e2e8f0; 
            padding: 12px 30px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            transition: background 0.3s ease;
        }

        .header-tool-btn { 
            width: 40px; 
            height: 40px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border-radius: 10px; 
            color: var(--text-muted); 
            cursor: pointer; 
            transition: 0.3s; 
            border: 1px solid #e2e8f0; 
        }

        .dark-mode .header-tool-btn { border-color: #334155; }
        .header-tool-btn:hover { background-color: rgba(0,0,0,0.05); color: var(--accent-emerald); }
        .dark-mode .header-tool-btn:hover { background-color: rgba(255,255,255,0.05); }

        /* Cards */
        .scan-card { 
            background: var(--bg-card); 
            border: 1px solid rgba(0,0,0,0.05); 
            border-radius: 1rem; 
            padding: 1.25rem; 
            transition: all 0.3s ease;
        }
        .dark-mode .scan-card { border-color: rgba(255,255,255,0.05); }
        .scan-card:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05); }

        /* Modal Background Styling */
        .modal-overlay {
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
        }

        .fade-in { animation: fadeIn 0.6s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .lang-txt { display: inline-block; }
    </style>
</head>
<body>

    <nav id="sidebar">
        <div class="sidebar-header">
            <h2 class="text-2xl font-black italic">SDXD</h2>
            <div class="my-4"><i class="fas fa-tooth fa-3x"></i></div>
            <p class="text-[10px] font-bold opacity-70 uppercase tracking-widest lang-txt" data-en="Patient Portal" data-ar="بوابة المريض">Patient Portal</p>
        </div>
        <ul class="mt-6">
            <li><a href="patient-dashboard.html"><i class="fas fa-th-large"></i> <span class="lang-txt" data-en="Dashboard" data-ar="الرئيسية">Dashboard</span></a></li>
            
            <li class="active"><a href="#"><i class="fas fa-images"></i> <span class="lang-txt" data-en="My Scans" data-ar="أشعّتي">My Scans</span></a></li>
            
            <li><a href="appointments.html"><i class="fas fa-calendar-alt"></i> <span class="lang-txt" data-en="Appointments" data-ar="المواعيد">Appointments</span></a></li>
            <li><a href="help_pat.html"><i class="fas fa-question-circle"></i> <span class="lang-txt" data-en="Help Support" data-ar="الدعم والمساعدة">Help Support</span></a></li>
            
            <li class="mt-20">
                <button id="logoutBtn" class="w-full text-left px-6 py-3.5 text-red-400 hover:text-red-500 transition-all flex items-center gap-3 font-bold text-sm">
                    <i class="fas fa-sign-out-alt"></i> 
                    <span class="lang-txt" data-en="Logout" data-ar="تسجيل الخروج">Logout</span>
                </button>
            </li>
        </ul>
    </nav>

    <div class="flex-1 flex flex-col overflow-y-auto">
        
        <header>
            <div class="flex gap-3">
                <div class="header-tool-btn" id="langBtn" title="Translate"><i class="fas fa-language text-xl"></i></div>
                <div class="header-tool-btn" id="modeToggle" title="Toggle Mode">
                    <i class="fas fa-moon text-lg" id="modeIcon"></i>
                </div>
            </div>
        </header>

        <div class="p-8 max-w-6xl mx-auto w-full fade-in space-y-8">
            <div>
                <h1 class="text-3xl font-extrabold uppercase tracking-tight lang-txt" data-en="My Dental Scans" data-ar="سجل الأشعة الخاصة بي" style="color: var(--text-main);">My Dental Scans</h1>
                <p class="text-sm mt-1 font-semibold lang-txt" data-en="View your historical X-rays and AI assisted detection reports." data-ar="استعرض أرشيف الأشعة السابقة وتقارير الفحص المعتمدة على الذكاء الاصطناعي." style="color: var(--text-muted);">View your historical X-rays and AI assisted detection reports.</p>
            </div>

            <!-- حاوية شبكة التحاليل الديناميكية المرفوعة كجدول مرن -->
            <div id="scansContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- سيتم جلب وعرض الكروت هنا ديناميكياً بواسطة الجافا سكريبت -->
            </div>
        </div>
    </div>

    <!-- حاوية الـ Modals المنبثقة التفاعلية -->
    <div id="modalsContainer">
        <!-- سيتم بناء النوافذ المنبثقة هنا ديناميكياً بناءً على التحاليل -->
    </div>
    <script>
    let scansData = []; 
    let currentLang = localStorage.getItem('lang') || 'en';
    let currentTheme = localStorage.getItem('theme') || 'light';

    async function loadScans() {
        try {
            const token = localStorage.getItem("token");
            const res = await fetch('/patient-scans', {
                headers: { "Authorization": "Bearer " + token }
            });
            const data = await res.json();

            if (!data.success) {
                console.error(data.message);
                return;
            }

            // تخزين البيانات الخام فقط بدون ترجمة ثابتة
            scansData = data.scans.map(scan => ({
                id: "scan_" + scan.scan_id,
                title: scan.scan_type,
                date: scan.scan_date,
                img: "/upload/" + scan.image_path,
                rawStatus: scan.status, // تخزين الحالة كما هي
                modalImg: "/upload/" + scan.image_path,
                scanType: scan.scan_type,
                noteD: scan.notes,
                modalType: scan.diagnosis_label,
                noteEn: scan.findings_json,
                modalTitleEn: "Report Details",
                modalTitleAr: "تفاصيل التقرير",
                modalIcon: "fas fa-file-medical",
                modalTitleColor: "text-blue-600"
            }));
            
            renderScans();
        } catch (err) {
            console.error("Error loading scans:", err);
        }
    }

    function renderScans() {
        const container = document.getElementById('scansContainer');
        const modalsContainer = document.getElementById('modalsContainer');
        
        container.innerHTML = '';
        modalsContainer.innerHTML = '';

        scansData.forEach(scan => {
            // الترجمة الديناميكية للحالة
            const isAr = currentLang === 'ar';
            const statusText = isAr ? 
                (scan.rawStatus === "done" ? "مكتمل" : scan.rawStatus === "pending" ? "قيد الانتظار" : "مرفوض") :
                (scan.rawStatus === "done" ? "Done" : scan.rawStatus === "pending" ? "Pending" : "Rejected");
            
            const statusBg = scan.rawStatus === "done" ? "bg-emerald-100" : scan.rawStatus === "pending" ? "bg-yellow-100" : "bg-red-100";
            const statusColor = scan.rawStatus === "done" ? "text-emerald-600" : scan.rawStatus === "pending" ? "text-yellow-600" : "text-red-600";
            const statusIcon = scan.rawStatus === "done" ? "fas fa-check-circle" : scan.rawStatus === "pending" ? "fas fa-clock" : "fas fa-times-circle";

            const card = document.createElement('div');
            card.className = "scan-card flex flex-col justify-between";
            card.innerHTML = `
                <div>
                    <div class="relative bg-slate-900 rounded-lg overflow-hidden h-40 mb-3 border border-slate-200 dark:border-slate-700">
                        <img src="${scan.img}" class="w-full h-full object-cover">
                    </div>
                    <h4 class="text-sm font-extrabold" style="color: var(--text-main);">${scan.title}</h4>
                    <p class="text-xs font-semibold opacity-60 mt-1">${scan.date}</p>
                    <div class="mt-3 p-2 rounded ${statusBg} text-xs font-bold ${statusColor} flex items-center gap-2">
                        <i class="${statusIcon}"></i>
                        <span>${statusText}</span>
                    </div>
                </div>
                <div class="mt-4 pt-3 border-t border-slate-100 dark:border-slate-700/50 flex gap-2">
                    <button onclick="openModal('${scan.id}')" class="flex-1 py-2 rounded-lg bg-slate-200/60 dark:bg-slate-700 text-[var(--text-main)] hover:bg-emerald-500 hover:text-white text-xs font-bold transition-all text-center lang-txt" data-en="View Full Report" data-ar="عرض التقرير الكامل">
                        ${isAr ? "عرض التقرير الكامل" : "View Full Report"}
                    </button>
                </div>
            `;
            container.appendChild(card);

            const modal = document.createElement('div');
            modal.id = scan.id;
            modal.className = "fixed inset-0 z-50 hidden modal-overlay flex items-center justify-center p-4";
            modal.innerHTML = `
                <div class="w-full max-w-4xl max-h-[90vh] overflow-y-auto rounded-2xl p-6 shadow-2xl relative" style="background: var(--bg-card); color: var(--text-main);">
                    <div class="flex justify-between items-center border-b pb-3 mb-4">
                        <h3 class="text-base font-extrabold flex items-center gap-2">
                            <i class="${scan.modalIcon}"></i>
                            <span class="lang-txt" data-en="${scan.modalTitleEn}" data-ar="${scan.modalTitleAr}">${isAr ? scan.modalTitleAr : scan.modalTitleEn}</span>
                        </h3>
                        <button onclick="closeModal('${scan.id}')" class="text-slate-400 hover:text-slate-600 text-lg"><i class="fas fa-times"></i></button>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="bg-black rounded-xl overflow-hidden h-48 border border-red-500/30">
                            <img src="${scan.modalImg}" class="w-full h-full object-cover opacity-80">
                        </div>
                        <div class="space-y-3 text-xs font-bold" style="color: var(--text-muted);">
                            <p><span class="text-slate-400">${isAr ? "نوع الأشعة :" : "Scan Type:"}</span> ${scan.scanType}</p>
                            <p><span class="text-slate-400">${isAr ? "تسمية التشخيص:" : "Diagnosis label:"}</span> ${scan.modalType}</p>
                            <p><span class="text-slate-400">${isAr ? "ملاحظات الذكاء الاصطناعي:" : "AI Notes:"}</span> ${scan.noteEn}</p>
                            <p class="fas fa-user-md"><span class="text-slate-400 mx-1">${isAr ? "ملاحظات الطبيب" : "Doctor's notes"}</span></p>
                            <div class="mt-2 p-3 bg-red-50 dark:bg-red-500/10 text-red-500 rounded-lg">${scan.noteD || "No doctor's notes"}</div>
                        </div>
                    </div>
                </div>
            `;
            modalsContainer.appendChild(modal);
        });
    }

    const body = document.body;
const modeToggle = document.getElementById('modeToggle');
const modeIcon = document.getElementById('modeIcon');
const langBtn = document.getElementById('langBtn');

function applyTheme(theme) {
    if (theme === 'dark') {
        document.body.classList.add('dark-mode');
        modeIcon.className = 'fas fa-sun text-lg';
    } else {
        document.body.classList.remove('dark-mode');
        modeIcon.className = 'fas fa-moon text-lg';
    }
}

    function applyLanguage(lang) {
    currentLang = lang;

    document.querySelectorAll('.lang-txt').forEach(el => {
        if (el.getAttribute(`data-${lang}`)) {
            el.innerText = el.getAttribute(`data-${lang}`);
        }
    });

    document.body.style.direction = (lang === 'ar') ? 'rtl' : 'ltr';

}

document.getElementById('langBtn').addEventListener('click', () => {
    currentLang = currentLang === "en" ? "ar" : "en";
    localStorage.setItem("lang", currentLang);

    applyLanguage(currentLang);
    renderScans();   // فقط هنا
});
modeToggle.addEventListener('click', () => {
    const newTheme = document.body.classList.contains('dark-mode') ? 'light' : 'dark';
    localStorage.setItem('theme', newTheme);
    applyTheme(newTheme);
});

    // تهيئة الصفحة
    applyTheme(currentTheme);
    applyLanguage(currentLang);
    loadScans();
    
    // دوال المودال
    function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
    function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
    
    // باقي الكود (الثيم وتسجيل الخروج) يعمل كما هو
    document.getElementById('logoutBtn')?.addEventListener('click', () => {
    localStorage.clear();
    sessionStorage.clear();
    window.location.href = "loginpat.html";
});
    // ...
</script>
</body>
</html>
