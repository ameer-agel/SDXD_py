<!DOCTYPE html>
<html lang="en" id="mainHtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDXD - Patient Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --sidebar-blue: #345e85; 
            --accent-emerald: #10b981;
            --bg-body: #f1f5f9;
            --bg-card: #ffffff;
            --text-main: #000000; 
            --text-muted: #334155; 
            --header-bg: #ffffff;
        }

        .dark-mode {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --text-main: #ffffff; 
            --text-muted: #cbd5e1; 
            --header-bg: #1e293b;
            --sidebar-blue: #1a365d;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-body); 
            color: var(--text-main);
            direction: ltr !important; 
            display: flex;
            height: 100vh;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        /* Sidebar */
        #sidebar { 
            min-width: 260px; 
            background: var(--sidebar-blue); 
            color: #fff; 
            height: 100vh; 
            flex-shrink: 0;
            transition: background 0.3s ease;
        }

        .sidebar-header { padding: 30px 10px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        
        #sidebar ul li a { 
            padding: 14px 25px; 
            display: flex; 
            align-items: center; 
            color: #cbdcf0; 
            text-decoration: none; 
            font-size: 14px; 
            transition: 0.3s; 
            border-left: 4px solid transparent; 
        }

        #sidebar ul li a:hover { background: rgba(255,255,255,0.05); color: #fff; }
        #sidebar ul li.active a { background: rgba(255,255,255,0.1); color: #fff; border-left: 4px solid var(--accent-emerald); }
        #sidebar ul li a i { margin-right: 12px; width: 20px; text-align: center; }

        /* Header */
        header { 
            background: var(--header-bg); 
            border-bottom: 1px solid #e2e8f0; 
            padding: 12px 30px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            transition: background 0.3s ease;
        }

        .header-tool-btn { 
            width: 40px; 
            height: 40px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border-radius: 10px; 
            color: var(--text-muted); 
            cursor: pointer; 
            transition: 0.3s; 
            border: 1px solid #e2e8f0; 
        }

        .dark-mode .header-tool-btn { border-color: #334155; }
        .header-tool-btn:hover { background-color: rgba(0,0,0,0.05); color: var(--accent-emerald); }
        .dark-mode .header-tool-btn:hover { background-color: rgba(255,255,255,0.05); }

        /* Cards */
        .dashboard-card { 
            background: var(--bg-card); 
            border: 1px solid rgba(0,0,0,0.05); 
            border-radius: 1rem; 
            padding: 1.5rem; 
            transition: background 0.3s ease;
        }
        .dark-mode .dashboard-card { border-color: rgba(255,255,255,0.05); }
        
        .fade-in { animation: fadeIn 0.6s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Timeline Styles */
        .timeline-item { position: relative; padding-left: 2rem; border-left: 2px solid #e2e8f0; }
        .dark-mode .timeline-item { border-left-color: #334155; }
        .timeline-dot { position: absolute; left: -6px; top: 4px; width: 10px; height: 10px; border-radius: 50%; background: var(--accent-emerald); }

        .lang-txt { display: inline-block; }

        /* حل مشكلة تباين ووضوح النصوص في الـ Dark Mode لجعلها ساطعة وواضحة */
        .dark-mode h1,
        .dark-mode h3,
        .dark-mode h4:not(.text-amber-500):not(.text-red-500),
        .dark-mode h5,
        .dark-mode p {
            color: var(--text-main) !important;
        }
        .dark-mode p.text-slate-500,
        .dark-mode .text-slate-500 {
            color: var(--text-muted) !important;
        }
    </style>

    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark', 'dark-mode');
        }
    </script>
</head>
<body>

   <nav id="sidebar">
    <div class="sidebar-header">
        <h2 class="text-2xl font-black italic">SDXD</h2>
        <div class="my-4"><i class="fas fa-tooth fa-3x"></i></div>
        <p class="text-[10px] font-bold opacity-70 uppercase tracking-widest lang-txt" data-en="Patient Portal" data-ar="بوابة المريض">Patient Portal</p>
    </div>

    <ul class="mt-6">
        <li class="active"><a href="#"><i class="fas fa-th-large"></i> <span class="lang-txt" data-en="Dashboard" data-ar="الرئيسية">Dashboard</span></a></li>
        
        <li><a href="my-scans.html"><i class="fas fa-images"></i> <span class="lang-txt" data-en="My Scans" data-ar="أشعّتي">My Scans</span></a></li>
        <li><a href="appointments.html"><i class="fas fa-calendar-alt"></i> <span class="lang-txt" data-en="Appointments" data-ar="المواعيد">Appointments</span></a></li>
        <li><a href="help_pat.html"><i class="fas fa-question-circle"></i> <span class="lang-txt" data-en="Help Support" data-ar="الدعم والمساعدة">Help Support</span></a></li>
        
        <li class="mt-20">
            <button id="logoutBtn" class="w-full text-left px-6 py-3.5 text-red-400 hover:text-red-500 transition-all flex items-center gap-3 font-bold text-sm">
                <i class="fas fa-sign-out-alt"></i> 
                <span class="lang-txt" data-en="Logout" data-ar="تسجيل الخروج">Logout</span>
            </button>
        </li>
    </ul>
</nav>

    <div class="flex-1 flex flex-col overflow-y-auto">
        
        <header>
            <div class="flex gap-3">
                <div class="header-tool-btn" id="langBtn" title="Translate"><i class="fas fa-language text-xl"></i></div>
                <div class="header-tool-btn" id="modeToggle" title="Toggle Mode">
                    <i class="fas fa-moon text-lg" id="modeIcon"></i>
                </div>
            </div>
        </header>

        <div class="p-8 max-w-6xl mx-auto w-full fade-in space-y-8">
            
            <div>
                <h1 id="NamePatent" class="text-3xl font-extrabold uppercase tracking-tight lang-txt" data-en="Welcome back, " data-ar="مرحباً بك مجدداً، " style="color: var(--text-main);">Welcome back, </h1>
                <p class="text-sm mt-1 font-semibold lang-txt" data-en="Track your dental treatment health status and AI diagnosis results." data-ar="تابع حالة علاج أسنانك ونتائج تشخيص الذكاء الاصطناعي الخاصة بك." style="color: var(--text-muted);">Track your dental treatment health status and AI diagnosis results.</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="dashboard-card flex items-center justify-between">
                    <div>
                        <p class="text-xs font-bold uppercase opacity-60 tracking-wider mb-1 lang-txt" data-en="Next Appointment" data-ar="الموعد القادم">Next Appointment</p>
                        <h4 id="update_at" class="text-lg font-extrabold" style="color: var(--sidebar-blue);"> </h4>
                        <p id="NameDoctor" class="text-xs font-semibold opacity-80 mt-1 lang-txt" data-en=" " data-ar=" "> </p>
                    </div>
                    <div class="w-12 h-12 rounded-xl bg-emerald-50 dark:bg-emerald-500/10 text-emerald-500 flex items-center justify-center text-xl"><i class="fas fa-calendar-check"></i></div>
                </div>

                <div class="dashboard-card flex items-center justify-between">
                    <div>
                        <p class="text-xs font-bold uppercase opacity-60 tracking-wider mb-1 lang-txt" data-en="Latest Scan Analysis" data-ar="آخر تحليل للأشعة">Latest Scan Analysis</p>
                        <h4 id="diagnosis_label" class="text-lg font-extrabold text-red-500 lang-txt" data-en=" " data-ar=" "> </h4>
                    </div>
                    <div class="w-12 h-12 rounded-xl bg-red-50 dark:bg-red-500/10 text-red-500 flex items-center justify-center text-xl"><i class="fas fa-robot"></i></div>
                </div>

                <div class="dashboard-card flex items-center justify-between space-y-6">
                    <div>
                        <h3 class="text-xs font-extrabold uppercase tracking-widest mb-3 flex items-center gap-2 opacity-90">
                            <i class="fas fa-lightbulb text-amber-400"></i>
                            <span class="lang-txt" data-en="Doctor Notes" data-ar="  نصيحة الطبيب "> Doctor Notes </span>
                        </h3>
                        <p id="Notes" class="text-xs font-bold leading-relaxed opacity-90 lang-txt" data-en=" " data-ar=" ">
                        </p>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                
                <div class="lg:col-span-2 space-y-6">
                    <div class="dashboard-card">
                        <div class="flex items-center justify-between border-b pb-3 mb-4" style="border-color: rgba(0,0,0,0.1);">
                            <h3 class="text-sm font-extrabold uppercase tracking-wider flex items-center gap-2">
                                <i class="fas fa-radiation text-emerald-500"></i>
                                <span class="lang-txt" data-en="My Latest X-Ray Analysis" data-ar="آخر صورة أشعة وتحليل طبي">My Latest X-Ray Analysis</span>
                            </h3>
                            <span id="scan_date" class="text-[10px] bg-slate-100 dark:bg-slate-700 font-bold px-2 py-1 rounded text-slate-500 dark:text-slate-300"> </span>
                        </div>
                        
                        <div class="relative bg-black rounded-xl overflow-hidden border border-slate-200 dark:border-slate-700 h-64 flex items-center justify-center">
                            <img id="image_path" src="https://images.unsplash.com/photo-1588776814546-1ffcf47267a5?auto=format&fit=crop&q=80&w=800" class="w-full h-full object-cover opacity-60">
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
    <script>
        const modeToggle = document.getElementById('modeToggle');
        const modeIcon = document.getElementById('modeIcon');
        const langBtn = document.getElementById('langBtn');
        const body = document.body;
        const sidebar = document.getElementById('sidebar');

        // دالة تطبيق الثيم الموحدة والمتوافقة مع كلاسات Tailwind
        function applyTheme(theme) {
            if (theme === 'dark') {
                body.classList.add('dark-mode');
                document.documentElement.classList.add('dark');
                if (modeIcon) modeIcon.className = 'fas fa-sun text-lg';
            } else {
                body.classList.remove('dark-mode');
                document.documentElement.classList.remove('dark');
                if (modeIcon) modeIcon.className = 'fas fa-moon text-lg';
            }
        }

        // دالة تطبيق اللغة والاتجاهات
        function applyLanguage(lang) {
            document.querySelectorAll('.lang-txt').forEach(el => {
                el.innerText = el.getAttribute(`data-${lang}`);
            });
            
            if (lang === 'ar') {
                body.style.direction = 'rtl';
                document.querySelectorAll('.timeline-item').forEach(el => {
                    el.style.paddingLeft = '0';
                    el.style.paddingRight = '2rem';
                    el.style.borderLeft = 'none';
                    el.style.borderRight = '2px solid rgba(0,0,0,0.1)';
                });
                document.querySelectorAll('.timeline-dot').forEach(el => {
                    el.style.left = 'auto';
                    el.style.right = '-6px';
                });
                document.querySelectorAll('#sidebar ul li a').forEach(el => {
                    el.style.borderLeft = 'transparent';
                    el.style.borderRight = '4px solid transparent';
                });
            } else {
                body.style.direction = 'ltr';
                document.querySelectorAll('.timeline-item').forEach(el => {
                    el.style.paddingLeft = '2rem';
                    el.style.paddingRight = '0';
                    el.style.borderLeft = '2px solid rgba(0,0,0,0.1)';
                    el.style.borderRight = 'none';
                });
                document.querySelectorAll('.timeline-dot').forEach(el => {
                    el.style.left = '-6px';
                    el.style.right = 'auto';
                });
            }
        }

        // قراءة وتطبيق الإعدادات فور تحميل الصفحة من الـ localStorage الموحد للنظام
        let currentTheme = localStorage.getItem('theme') || 'light';
        let currentLang = localStorage.getItem('lang') || 'en';
        
        applyTheme(currentTheme);
        applyLanguage(currentLang);

        // أحداث الضغط للتبديل والحفظ المباشر
        if (modeToggle) {
            modeToggle.addEventListener('click', () => {
                currentTheme = body.classList.contains('dark-mode') ? 'light' : 'dark';
                localStorage.setItem('theme', currentTheme);
                applyTheme(currentTheme);
            });
        }

        if (langBtn) {
            langBtn.addEventListener('click', () => {
                currentLang = currentLang === 'en' ? 'ar' : 'en';
                localStorage.setItem('lang', currentLang);
                applyLanguage(currentLang);
            });
        }

        // تحديثات المزامنة الفورية في الخلفية
        window.addEventListener('storage', (e) => {
            if (e.key === 'theme') applyTheme(e.newValue);
            if (e.key === 'lang') applyLanguage(e.newValue);
        });
        
document.getElementById('logoutBtn').addEventListener('click', (e) => {
    e.preventDefault();
    sessionStorage.clear(); 
    const logoutMsg = currentLang === 'ar' ? 'تم تسجيل خروجك بأمان!' : 'You have been logged out successfully!';
    alert(logoutMsg);
    
    // التوجيه الصحيح إلى صفحة تسجيل الدخول المحلية الخاصة بك
    window.location.href = 'loginpat.html';
});


const token = sessionStorage.getItem("token");

fetch("/patient-dashboard-data", {
    headers: {
        Authorization: "Bearer " + token
    }
})
.then(res => res.json())
.then(data => {

    //if(!data.success){
      //  alert("Unauthorized");
        //location.href="loginpat.html";
        //return;
   // }

    const p = data.patient;

    document.getElementById("NamePatent").innerHTML =
        "Welcome back, " + (p.full_name || "");

    document.getElementById("diagnosis_label").innerText =
        p.diagnosis_label || "No Diagnosis";

    document.getElementById("Notes").innerText =
        p.notes || "No Notes";

    document.getElementById("scan_date").innerText =
        p.scan_date || "";

document.getElementById("update_at").innerText =
    (p.preferred_date || "No Appointment") +
    " " +
    (p.preferred_time || "");
    document.getElementById("NameDoctor").innerText =
        p.first_name && p.last_name
            ? "Dr. " + p.first_name + " " + p.last_name
            : "";

    if (p.image_path) {
    document.getElementById("image_path").src =
        "/upload/" + p.image_path;
}

});


</script>
    
</body>
</html>
