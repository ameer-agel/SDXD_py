<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDXD — بيانات المدير</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/manager.css') }}">
</head>
<body>

<!-- ===== HEADER ===== -->
<header class="manager-header">
    <a href="/manager-dashboard.html" class="logo">SDXD <span>Manager</span></a>
    <nav>
        <ul class="manager-nav">
            <li><a href="/manager-dashboard.html">🏠 الرئيسية</a></li>
            <li><a href="/manager-page.html">👤 بيانات المدير</a></li>
            <li><button onclick="toggleDarkMode()" class="dark-toggle">🌙</button></li>
            <li><button onclick="managerLogout()" class="logout-btn">تسجيل خروج</button></li>
        </ul>
    </nav>
</header>

<!-- ===== MAIN ===== -->
<main class="manager-main">

    <!-- بيانات المدير -->
    <div class="card">
        <div class="card-title">👤 بياناتي الشخصية</div>
        <table class="manager-table">
            <thead>
                <tr>
                    <th>الاسم الكامل</th>
                    <th>رقم الهوية</th>
                    <th>اسم المستخدم</th>
                    <th>الإجراءات</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td id="admin-fullname">—</td>
                    <td id="admin-idnumber">—</td>
                    <td id="admin-username">—</td>
                    <td>
                        <button class="btn btn-primary btn-sm" onclick="openAdminEditModal()">تعديل بياناتي</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- روابط سريعة -->
    <div class="card">
        <div class="card-title">🔗 روابط سريعة</div>
        <div class="btn-group">
            <a href="/manager-dashboard.html" class="btn btn-primary">👥 إدارة الأطباء والمرضى</a>
            <button onclick="managerLogout()" class="btn btn-danger">🚪 تسجيل الخروج</button>
        </div>
    </div>

</main>

<!-- ===== MODAL: EDIT ADMIN ===== -->
<div class="modal-overlay" id="edit-admin-modal">
    <div class="modal-box">
        <div class="modal-title">✏️ تعديل بياناتي الشخصية</div>
        <form id="admin-edit-form" autocomplete="off">
            <div class="form-group">
                <label class="form-label">اسم المستخدم</label>
                <input type="text" id="admin-edit-username" class="form-input" />
                <span class="error-msg" id="admin-username-error"></span>
            </div>
            <div class="form-group">
                <label class="form-label">كلمة المرور الجديدة</label>
                <input type="password" id="admin-edit-password" class="form-input" placeholder="اتركها فارغة لعدم التغيير" />
                <span class="error-msg" id="admin-password-error"></span>
            </div>
            <div class="btn-group">
                <button type="submit" class="btn btn-success">حفظ</button>
                <button type="button" class="btn btn-secondary" onclick="closeModal('edit-admin-modal')">إلغاء</button>
            </div>
        </form>
    </div>
</div>

<script src="{{ url_for('static', filename='js/manager.js') }}"></script>
<script>
function openAdminEditModal() {
    document.getElementById('admin-edit-username').value = document.getElementById('admin-username').textContent.trim();
    document.getElementById('admin-edit-password').value = '';
    openModal('edit-admin-modal');
}
</script>
</body>
</html>
